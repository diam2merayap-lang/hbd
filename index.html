<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#ffe8ec;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    width:100%;
    max-width:700px;
    text-align:center;
    padding:20px;
}

/* ---------- Envelope ---------- */

#envelopePage{
    display:flex;
    flex-direction:column;
    align-items:center;
}

.envelope{
    position:relative;
    width:280px;
    height:180px;
    perspective:800px;
    transition:.3s;
}

.envelope.loaded{
    cursor:pointer;
}

.body{
    position:absolute;
    width:100%;
    height:100%;
    background:#f6b2b2;
    border-radius:10px;
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#ef8f8f;
    clip-path:polygon(0 0,50% 60%,100% 0);
    transform-origin:top;
    transition:.8s;
}

.open .flap{
    transform:rotateX(180deg);
}

.note{
    margin-top:25px;
    font-size:18px;
    color:#555;
}

.disabled{
    opacity:.5;
    pointer-events:none;
    cursor:not-allowed;
}

.loaded{
    opacity:1;
    pointer-events:auto;
}

/* ---------- Slider ---------- */

#sliderPage{
    display:none;
}

.slide img{
    width:100%;
    max-width:500px;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.18);
}

.counter{
    margin-bottom:15px;
    color:#d35d7f;
    font-weight:bold;
}

.slide p{
    margin-top:20px;
    font-size:22px;
    color:#444;
    min-height:70px;
    line-height:1.5;
}

.buttons{
    margin-top:30px;
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:50px;
    background:#ff7a9c;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:translateY(-2px);
}

button:disabled{
    opacity:.4;
    cursor:not-allowed;
}

/* ---------- Final ---------- */

#finalPage img{
    width:100%;
    max-width:500px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.18);
}

#finalPage h1{
    margin-top:25px;
    color:#d24b73;
}

#finalPage p{
    margin-top:15px;
    font-size:20px;
    color:#555;
    line-height:1.7;
}

.fade{
    animation:fade .4s;
}

@keyframes fade{
from{
    opacity:0;
    transform:translateY(10px);
}
to{
    opacity:1;
    transform:translateY(0);
}
}
    /* Final animation */

#finalPage{
    display:none;
    opacity:0;
    transform:scale(.8);
    transition:all .8s ease;
}

#finalPage.show{
    display:block;
    opacity:1;
    transform:scale(1);
}

#finalPage img{
    animation:pop .8s ease;
}

#finalPage h1{
    opacity:0;
    animation:fadeUp .8s .4s forwards;
}

#finalPage p{
    opacity:0;
    animation:fadeUp .8s .8s forwards;
}

@keyframes pop{
    0%{
        transform:scale(.6) rotate(-5deg);
        opacity:0;
    }
    60%{
        transform:scale(1.08) rotate(2deg);
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Flash */

.flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
}

.flash.show{
    animation:flash .6s;
}

@keyframes flash{
    0%{opacity:0;}
    30%{opacity:.95;}
    100%{opacity:0;}
}
</style>

</head>
<body>

<div class="container">

<!-- Envelope -->

<div id="envelopePage">

<div class="envelope disabled" id="envelope">
    <div class="body"></div>
    <div class="flap"></div>
</div>

<div class="note" id="loadingText">
⏳ Loading images... (0/4)
</div>

</div>

<!-- Slider -->

<div id="sliderPage">

<div class="counter" id="counter"></div>

<div class="slide fade">

<img id="slideImage" src="">

<p id="slideText"></p>

<div class="buttons">
<button id="prevBtn">← Previous</button>
<button id="nextBtn">Next →</button>
</div>

</div>

</div>

<!-- Final -->

<div id="finalPage">

<img src="final.png">

<h1>Happy Birthday! 🎂</h1>

<p>
Thank you for everything.<br><br>

I hope this birthday brings lots of happiness,
good health, wonderful memories,
and countless reasons to smile.

Have an amazing year ahead! ❤️
</p>

</div>

</div>
<div class="flash" id="flash"></div>
<script>

const slides=[
{
image:"img1.png",
text:"I hope today is filled with happiness and laughter. 😊"
},
{
image:"img2.png",
text:"Thank you for all the wonderful memories we've shared together. 💕"
},
{
image:"img3.png",
text:"May every wish you make today come true. Happy Birthday! 🎉"
}
];

const imageFiles=[
"img1.png",
"img2.png",
"img3.png",
"final.png"
];

let current=0;
let loaded=0;
let failed=0;

const envelope=document.getElementById("envelope");
const envelopePage=document.getElementById("envelopePage");
const sliderPage=document.getElementById("sliderPage");
const finalPage=document.getElementById("finalPage");

const slideImage=document.getElementById("slideImage");
const slideText=document.getElementById("slideText");
const counter=document.getElementById("counter");

const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");
const loadingText=document.getElementById("loadingText");
const flash=document.getElementById("flash");

function preloadImages(){

    imageFiles.forEach(src=>{

        const img=new Image();

        img.onload=imageLoaded;
        img.onerror=imageFailed;

        img.src=src;

    });

}

function imageLoaded(){

    loaded++;
    checkFinished();

}

function imageFailed(){

    failed++;
    checkFinished();

}

function checkFinished(){

    loadingText.innerHTML=`⏳ Loading images... (${loaded+failed}/${imageFiles.length})`;

    if((loaded+failed)!==imageFiles.length)
        return;

    if(failed>0){

        loadingText.innerHTML=`❌ Failed to load ${failed} image(s).`;
        return;

    }

    envelope.classList.remove("disabled");
    envelope.classList.add("loaded");

    loadingText.innerHTML="💌 Click the envelope";

}

function updateSlide(){

    slideImage.src=slides[current].image;
    slideText.innerHTML=slides[current].text;
    counter.innerHTML=`Memory ${current+1} / ${slides.length}`;

    prevBtn.disabled=current===0;

    if(current===slides.length-1){
        nextBtn.innerHTML="Finish ❤️";
    }else{
        nextBtn.innerHTML="Next →";
    }

    document.querySelector(".slide").classList.remove("fade");
    void document.querySelector(".slide").offsetWidth;
    document.querySelector(".slide").classList.add("fade");

}

prevBtn.onclick=function(){

    if(current>0){
        current--;
        updateSlide();
    }

}

nextBtn.onclick=function(){

    if(current<slides.length-1){

        current++;
        updateSlide();

    }else{

        flash.classList.add("show");
        void flash.offsetWidth;   // restart animation
flash.classList.add("show");

setTimeout(()=>{

    sliderPage.style.display="none";

    finalPage.style.display="block";

    requestAnimationFrame(()=>{
        finalPage.classList.add("show");
        flash.classList.remove("show");
    });

},350);

    }

}

envelope.onclick=function(){

    envelope.classList.add("open");

    setTimeout(()=>{

        envelopePage.style.display="none";
        sliderPage.style.display="block";

        updateSlide();

    },800);

}

preloadImages();

</script>

</body>
</html>
